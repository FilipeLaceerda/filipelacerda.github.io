<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>
<body>
<header>
    <nav>
        <a href="index.html">Home</a>
        <button>
            <img src="assets/dark-mode-svgrepo-com.svg" alt="Dark mode">
        </button>
    </nav>
</header>
<main>
    <h1 class="title-cadastro">Cadastro</h1>
    <form action="/registrar" method="post">
        <section>
            <label for="fnome">Nome</label>
            <input type="text" id="fnome" name="nome" placeholder="Digite seu nome">
        </section>
        <section>
            <label for="femail">Email</label>
            <input type="email" id="femail" name="email" placeholder="Digite seu email">
        </section>
        <section>
            <label for="ftelefone">Telefone</label>
            <input type="text" id="ftelefone" name="telefone" placeholder="Digite seu telefone">
        </section>
        <section>
            <label for="fpassword">Senha</label>
            <input type="password" id="fpassword" name="senha" placeholder="Digite sua senha">
        </section>
        <section>
            <label for="fdata">Data de Nascimento</label>
            <input type="date" id="fdata" name="data" placeholder="Digite sua data de nascimento">
        </section>
        <section class="genero">
            <div>
                <label for="fgeneroM">Masculino</label>
                <input type="radio" id="fgeneroM" name="genero" value="M">
            </div>
            <div>
                <label for="fgeneroF">Feminino</label>
                <input type="radio" id="fgeneroF" name="genero" value="F">
            </div>
        </section>
        <section class="action">
            <input id="enviar" type="submit" value="Enviar">
            <input id="limpar" type="reset" value="Limpar">
        </section>
    </form>
</main>
</body>
</html>
